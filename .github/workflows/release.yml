name: Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "npm"

            - run: npm ci
            - run: npm run build

            - name: Validate release metadata
              id: metadata
              run: |
                  node -e "const fs = require('fs'); const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8')); const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8')); if (!versions[manifest.version]) throw new Error('versions.json is missing manifest version ' + manifest.version); if (versions[manifest.version] !== manifest.minAppVersion) throw new Error('versions.json min app version does not match manifest.json'); const tag = process.env.GITHUB_REF_NAME; if (process.env.GITHUB_EVENT_NAME !== 'workflow_dispatch' && tag !== manifest.version) throw new Error('Git tag ' + tag + ' must match manifest version ' + manifest.version); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + manifest.version + '\n');"

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.metadata.outputs.version }}
                  files: |
                      manifest.json
                      main.js
                      styles.css
